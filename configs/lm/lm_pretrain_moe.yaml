# LM-MoE 预训练配置（纯文本语言模型，启用 MoE，从头训练）
model:
  hidden_size: 512
  num_hidden_layers: 8
  use_moe: 1            # 1 启用 MoE
  num_experts: 4
  num_experts_per_tok: 1
  moe_intermediate_size: 1408
  norm_topk_prob: true
  router_aux_loss_coef: 5.0e-4
  vocab_size: 6400
  max_seq_len: 340
  num_attention_heads: 8
  num_key_value_heads: 4
  dropout: 0.0

train:
  epochs: 2
  batch_size: 32
  learning_rate: 5.0e-4
  accumulation_steps: 8
  grad_clip: 1.0
  dtype: bfloat16
  save_interval: 1000
  log_interval: 100
  from_weight: none      # 从头开始预训练
  from_resume: 0

paths:
  save_dir: checkpoint/lm_pretrain_moe
  data_path: dataset/pretrain_t2t_mini.jsonl
