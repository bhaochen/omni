# VLM 训练配置（文本 + 视觉多模态）
model:
  hidden_size: 512
  num_hidden_layers: 8
  use_moe: 0            # 1 启用 MoE
  vocab_size: 6400
  max_seq_len: 768
  num_attention_heads: 8
  num_key_value_heads: 4
  dropout: 0.0
  # 视觉相关
  image_special_token: "<|image_pad|>"
  image_ids: [12]
  image_hidden_size: 768
  image_token_len: 64

train:
  epochs: 2
  batch_size: 16
  learning_rate: 1.0e-5
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  save_interval: 1000
  log_interval: 100
  from_weight: pretrain   # none / pretrain / full_sft
  from_resume: 0

paths:
  save_dir: checkpoint
  data_path: dataset/vlm/sft_i2t.parquet
  vision_dir: checkpoint/siglip
  tokenizer_dir: checkpoint/omni/native_hf
