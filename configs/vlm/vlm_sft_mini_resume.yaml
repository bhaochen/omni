# VLM SFT 续训练配置（from_resume=1 自动续训，加大 batch_size 吃满显存）
model:
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: 0
  vocab_size: 6400
  max_seq_len: 768
  num_attention_heads: 8
  num_key_value_heads: 4
  dropout: 0.0
  image_special_token: "<|image_pad|>"
  image_ids: [12]
  image_hidden_size: 768
  image_token_len: 64

train:
  epochs: 1
  batch_size: 24
  learning_rate: 5.0e-6
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  save_interval: 5000
  log_interval: 50
  num_workers: 0
  from_weight: omni
  model_dir: checkpoint/omni
  freeze_llm: 1
  from_resume: 1
  max_steps: 40000

paths:
  save_dir: checkpoint/vlm_sft_mini
  data_path: dataset/vlm/sft_i2t.parquet
  vision_dir: checkpoint/siglip
  tokenizer_dir: checkpoint/omni/native_hf
