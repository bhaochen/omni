# VLM-MoE SFT 配置（文本 + 视觉多模态，启用 MoE）
model:
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: 1
  num_experts: 4
  num_experts_per_tok: 1
  moe_intermediate_size: 1408
  norm_topk_prob: true
  router_aux_loss_coef: 5.0e-4
  vocab_size: 6400
  max_seq_len: 768
  num_attention_heads: 8
  num_key_value_heads: 4
  dropout: 0.0
  # 视觉相关
  image_special_token: "<|image_pad|>"
  image_ids: [12]
  image_hidden_size: 768
  image_token_len: 64

train:
  epochs: 2
  batch_size: 4
  learning_rate: 5.0e-6
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  save_interval: 1000
  log_interval: 100
  from_weight: none
  weight_path: checkpoint/omni_moe/omni_moe.pth   # MoE 权重路径
  freeze_llm: 1
  from_resume: 0

paths:
  save_dir: checkpoint
  data_path: dataset/vlm/sft_i2t.parquet
  vision_dir: checkpoint/siglip
  tokenizer_dir: checkpoint/omni/native_hf
