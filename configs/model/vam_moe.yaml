# VAM-MoE 训练配置（文本 + 视觉 + 语音全模态，启用 MoE）
model:
  hidden_size: 512
  num_hidden_layers: 8
  use_moe: 1            # 1 启用 MoE
  num_experts: 4
  num_experts_per_tok: 1
  moe_intermediate_size: 1408
  norm_topk_prob: true
  router_aux_loss_coef: 5.0e-4
  vocab_size: 6400
  max_seq_len: 1200
  num_attention_heads: 8
  num_key_value_heads: 4
  dropout: 0.0
  # Talker（语音生成）相关
  num_talker_hidden_layers: 4
  talker_hidden_size: 512
  # 音频相关
  audio_special_token: "<|audio_pad|>"
  audio_ids: [16]
  audio_hidden_size: 512
  audio_vocab_size: 2112
  audio_pad_token: 2049
  audio_stop_token: 2050
  audio_spk_token: 2051
  spk_emb_size: 192
  think_end_ids: [26, 234, 234]
  # 视觉相关
  image_special_token: "<|image_pad|>"
  image_ids: [12]
  image_hidden_size: 768
  image_token_len: 64
  bridge_layer: 3

train:
  epochs: 2
  batch_size: 16
  learning_rate: 1.0e-5
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  save_interval: 1000
  log_interval: 100
  from_weight: llm   # none / llm / pretrain / full_sft
  from_resume: 0

paths:
  save_dir: checkpoint/vam_moe
  data_path: dataset/omni_data.parquet
  audio_encoder_dir: model/sensevoice_small
  vision_dir: model/siglip2-base-p32-256-ve
