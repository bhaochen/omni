# VAM SFT 快速验证配置（Stage 3: A2A, mode=all, low LR）
# 参考 minimind-o mini pipeline: mode=all, from_weight=sft_omni, lr=2e-5, max_seq_len=768
model:
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: 0
  vocab_size: 6400
  max_seq_len: 768
  num_attention_heads: 8
  num_key_value_heads: 4
  dropout: 0.0
  # Talker（语音生成）相关
  num_talker_hidden_layers: 4
  talker_hidden_size: 768
  # 音频相关
  audio_special_token: "<|audio_pad|>"
  audio_ids: [16]
  audio_hidden_size: 512
  audio_vocab_size: 2112
  audio_pad_token: 2049
  audio_stop_token: 2050
  audio_spk_token: 2051
  spk_emb_size: 192
  think_end_ids: [26, 234, 234]
  # 视觉相关
  image_special_token: "<|image_pad|>"
  image_ids: [12]
  image_hidden_size: 768
  image_token_len: 64
  bridge_layer: 3

train:
  epochs: 1
  batch_size: 4
  learning_rate: 2.0e-5
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 0
  save_interval: 2000
  log_interval: 50
  from_weight: sft_omni
  model_dir: checkpoint/vam_a2a_audio_proj_mini   # 加载 Stage 2 输出
  from_resume: 0
  freeze_backbone: none
  mode: all
  max_samples: 2000

paths:
  save_dir: checkpoint/vam_a2a_all_mini
  data_path: dataset/vam/sft_a2a_mini.parquet
  audio_encoder_dir: checkpoint/sensevoice
  vision_dir: checkpoint/siglip
  tokenizer_dir: checkpoint/omni/native_hf
